name: Autopilot Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/autopilot/**"
      - "autopilot-dashboard/**"
      - ".github/workflows/autopilot-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: autopilot-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: autopilot-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: autopilot-dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: autopilot-dashboard
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload autopilot dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/autopilot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
